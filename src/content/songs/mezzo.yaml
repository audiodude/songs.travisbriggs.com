note: >-
  After a lot of heavy Suno use (see <null.dangerthirdrail.com>), I went in a
  different direction and made a track like nothing I've made before. I wanted
  to explore glitchy ambient dub, which I know sounds very pretentious. But the
  real inspiration was that I wanted to make something that I would like
  listening to, if that makes any sense at all. Why have I not been doing this
  the _whole time_?
